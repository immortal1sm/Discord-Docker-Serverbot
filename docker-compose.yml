services:
  discord-bot:
    build: .
    container_name: discord-bot
    restart: unless-stopped

    # Map container UID (nodejs=1001) to host docker group GID (991)
    # so the process can access /var/run/docker.sock
    user: "1001:991"

    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - GUILD_ID=${GUILD_ID}
      - CONTROL_CHANNEL=${CONTROL_CHANNEL:-server-control}
      - SERVERS_YAML=${SERVERS_YAML}
      - SERVERS_JSON=${SERVERS_JSON}
      # IoT-ready / monitoring env vars (optional)
      - ALERTS_CHANNEL=${ALERTS_CHANNEL:-}
      - ADMIN_ROLES=${ADMIN_ROLES:-}
      - RESOURCE_ALERT_THRESHOLD=${RESOURCE_ALERT_THRESHOLD:-85}

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
